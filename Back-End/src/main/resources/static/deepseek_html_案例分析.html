		function animationImg(data){	
		const animationCanvas = document.getElementById('animationCanvas');
		const dpr = window.devicePixelRatio || 1;
		const rect = animationCanvas.getBoundingClientRect();
		animationCanvas.style.width = rect.width + 'px';
		animationCanvas.style.height = rect.height + 'px';
		animationCanvas.width = rect.width * dpr;
		animationCanvas.height = rect.height * dpr;
        const ctx = animationCanvas.getContext('2d');
		ctx.scale(dpr, dpr);
       // 然后按照400x300的尺寸进行绘制
       // 例如：绘制一个矩形
       //ctx.fillRect(0, 0, 100, 100); // 这个矩形在画布上实际会以200x200像素绘制

        let currentFrame = 0;
        const images = [];
        
        // 预加载所有图片
        for (let i = 0; i < data.length; i++) {
            const img = new Image();
			img.src = 'http://localhost:8080/infrared/files/' + data[i].imgPath
			img.alt= data[i].timeStr
			img.id= data[i].id
           // img.src = `frames/frame_${i.toString().padStart(4, '0')}.png`; // 路径格式如：frame_0000.png
            images.push(img);
        }
        
        function animate() {
            // 清除画布
            ctx.clearRect(0, 0, animationCanvas.width, animationCanvas.height);
            // 绘制当前帧
			sliderValue.value = currentFrame
            if (images[currentFrame].complete) {
                ctx.drawImage(images[currentFrame], 0, 0, animationCanvas.width, animationCanvas.height);
            }
            // 更新帧序号
            currentFrame = (currentFrame + 1) % frameCount;
        }
        // 按指定帧率启动动画
           timerId1 = setInterval(animate, 1000 / fps);
		}

                function removeByFixedStep(arr, step = 2) {
                  return arr.filter((_, index) => index % step == 0);
                }

                function calculateScaleForBounds(viewer, minLon, minLat, maxLon, maxLat) {
                  const ellipsoid = viewer.scene.globe.ellipsoid;
                  const centerLat = (minLat + maxLat) / 2; // 中心纬度减少误差
                  // 计算地理距离
                  const geodesic = new Cesium.EllipsoidGeodesic();
                  const start = Cesium.Cartographic.fromDegrees(minLon, centerLat);
                  const end = Cesium.Cartographic.fromDegrees(maxLon, centerLat);
                  geodesic.setEndPoints(start, end);
                  const distance = geodesic.surfaceDistance;
                  // 获取视图像素宽度
                  const pixelWidth = viewer.scene.canvas.clientWidth;
                  // 计算比例尺分母
                  const resolution = distance / pixelWidth;
                  const scaleDenominator = (96 * resolution) / 0.0254;
                  console.log(scaleDenominator);
                  return scaleDenominator;
                }

                function flyToPositions(positions, minLng, minLat, maxLng, maxLat) {
                  const center = Cesium.BoundingSphere.fromPoints(Cesium.Cartesian3.fromDegreesArray(positions)).center;
                  const cartographic = Cesium.Cartographic.fromCartesian(center);
                  const centerLat = Cesium.Math.toDegrees(cartographic.latitude);
                  const centerLng = Cesium.Math.toDegrees(cartographic.longitude);
                  viewer.camera.flyTo({
                    destination: Cesium.Cartesian3.fromDegrees(centerLng, centerLat, calculateScaleForBounds(viewer,
                      minLng, minLat, maxLng, maxLat)),
                  });
                }

                function drawOutline(positions) {
                  const outlinePrimitive = new Cesium.Primitive({
                    geometryInstances: new Cesium.GeometryInstance({
                      geometry: new Cesium.PolygonOutlineGeometry({
                        polygonHierarchy: new Cesium.PolygonHierarchy(Cesium.Cartesian3.fromDegreesArray(
                          positions)),
                        width: 10.0,
                        height: 0.5,
                        vertexFormat: Cesium.PolylineColorAppearance.VERTEX_FORMAT
                      })
                    }),
                    appearance: new Cesium.PolylineColorAppearance({
                      color: new Cesium.ColorGeometryInstanceAttribute(1.0, 0.0, 0.0, 1.0),
                      translucent: true,
                      renderState: {
                        depthTest: {
                          enabled: true
                        },
                        lighting: {
                          enabled: false
                        } // 关键配置‌:ml-citation{ref="1,5" data="citationList"}
                      }
                    })
                  });
                  viewer.scene.primitives.add(outlinePrimitive);
                }

                        //entity.polygon.fill = false; // 隐藏填充面
                        let minLng, minLat, maxLng, maxLat = null;

                          const longitude = Cesium.Math.toDegrees(cartographic.longitude); // 经度

                          if (!minLng || longitude < minLng) {
                            minLng = longitude;

                          if (!minLat || latitude < minLat) {
                            minLat = latitude;
                          }
                          if (!maxLng || longitude > maxLng) {

                          if (!maxLat || latitude > maxLat) {

                        }

                        const cartographic = Cesium.Cartographic.fromCartesian(center);

                function loadImage(url) {
                  return new Promise((resolve, reject) => {
                    const img = new Image();
                    img.crossOrigin = "anonymous";
                    img.src = url;
                    img.onload = () => resolve(img);
                    img.onerror = reject;
                  });
                }
                async function imageArrayToCanvasArray(imageUrls) {
                  return Promise.all(imageUrls.map(async (url) => {
                    const img = await loadImage(url);
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    return canvas;
                  }));
                }

                function loadMulImgAllResult(imgAddrArr) {
                  viewer.scene.mode = Cesium.SceneMode.SCENE3D;

                    let t = window.setInterval(() => {
                      currentIndex = (currentIndex + 1) % imgList.length;
                      viewer.entities.add({
                        rectangle: {
                          name: 'Multiple Img Result',
                          coordinates: Cesium.Rectangle.fromDegrees(-180, -90, 180, 90),
                          material: new Cesium.ImageMaterialProperty({
                            image: imgList[currentIndex],
                            transparent: true // 如果需要透明
                          })
                        }
                      });
                      viewer.scene.requestRender();
                    }, 1000);
                    //timer.push(t);
                  });
                }

                  let entities = viewer.entities._entities._array;
                  for (let i = entities.length - 1; i >= 0; i--) {
                    if (entities[i]._name === name) {
                      viewer.entities.remove(entities[i]);
                    }
                  }
                };

                function loadMulImgResult(imgAddrArr, leftUpPos, rightBottomPos) {
                  //cleanup();
                  viewer.scene.mode = Cesium.SceneMode.SCENE3D;
                  let currentIndex = 0;
                  let minLng = Math.min(leftUpPos.lon, rightBottomPos.lon);
                  let maxLng = Math.max(leftUpPos.lon, rightBottomPos.lon);
                  let minLat = Math.min(leftUpPos.lat, rightBottomPos.lat);
                  let maxLat = Math.max(leftUpPos.lat, rightBottomPos.lat);

				      /// 绘画台风轨迹及计算飞行时间
                    function typhoonFlytoPath(viewer, positions, typhoonName){

                        // 允许飞行动画
                        viewer.clock.shouldAnimate = true;
                        // 设定模拟时间的界限
                        const start = Cesium.JulianDate.fromDate(new Date(2018, 9, 7, 16));
                        const stop = Cesium.JulianDate.addSeconds(start, positions.length, new Cesium.JulianDate());
                     
                        viewer.clock.startTime = start.clone();
                        viewer.clock.stopTime = stop.clone();
                        viewer.clock.currentTime = start.clone();
                        viewer.clock.clockRange = Cesium.ClockRange.LOOP_STOP; //末尾循环
                        // 飞行速度，值越大速度越快，multiplier为0停止移动
                        viewer.clock.multiplier = 1;
                        viewer.timeline.zoomTo(start, stop);
                        // 计算飞行时间和位置
                        const property =  computeFlight(start, positions)
                     
                        var rotation = Cesium.Math.toRadians(300);
                     
                        function getRotationValue() {
                            rotation += -0.03;
                            return rotation;
                        }
                     
                        const typhoonEntity = viewer.entities.add({
                            name : '台风路径',
                            availability : new Cesium.TimeIntervalCollection([new Cesium.TimeInterval({
                                start : start,
                                stop : stop
                            })]),
                            position : property,
                            orientation : new Cesium.VelocityOrientationProperty(property), // 根据位置移动自动计算方向
                            ellipse : {
                                semiMinorAxis : 35000.0,
                                semiMajorAxis : 35000.0,
                                height: 0.0,
                                fill: true,
                                outlineColor: Cesium.Color.RED,
                                outlineWidth: 10,
                                outline : false,
                                rotation: new Cesium.CallbackProperty(getRotationValue, false),
                                stRotation: new Cesium.CallbackProperty(getRotationValue, false),
                                material: new Cesium.ImageMaterialProperty({
                                    image: "./res/tf.png",
                                    transparent: true
                                })
                            },
                            point : {
                                pixelSize : 10,
                                color : Cesium.Color.TRANSPARENT,
                                outlineColor : Cesium.Color.YELLOW,
                                outlineWidth : 4
                            },
                            label : {
                                text: typhoonName,
                                font : '18px sans-serif',
                                pixelOffset : new Cesium.Cartesian2(0.0, 50)
                            },
                            path : {
                                resolution : 1,
                                material : new Cesium.PolylineGlowMaterialProperty({
                                    glowPower : 0.9,
                                    color : Cesium.Color.YELLOW
                                }),
                                width : 1
                            }
                        })
                        pineAll.push(typhoonEntity);
                        // 设置飞行视角
                        viewer.trackedEntity = typhoonEntity;
                        viewer.flyTo(typhoonEntity,{
                            duration: 2,
                            offset : {
                                height: 20000,
                                heading : Cesium.Math.toRadians(0.0),
                                pitch : Cesium.Math.toRadians(-180),
                                range : 7000000
                            }
                        })
                        // 飞行视角追踪
                         preUpdateHandler = function(){
                            if(typhoonEntity){
                                const center = typhoonEntity.position.getValue(viewer.clock.currentTime);
                                const hpr = new Cesium.HeadingPitchRange(Cesium.Math.toRadians(0.0), Cesium.Math.toRadians(-90), 2000000)
                                if(center){
                                    viewer.camera.lookAt(center, hpr);
									
                                }
                     
                            }
                        }
                        // 飞行跟踪
                        viewer.scene.preUpdate.addEventListener(preUpdateHandler);
					   
                     
                        // 设置插值函数为拉格朗日算法
                        typhoonEntity.position.setInterpolationOptions({
                            interpolationDegree : 3,
                            interpolationAlgorithm : Cesium.LagrangePolynomialApproximation
                        });
                    }  
                    // 计算飞行时间和位置
                    function computeFlight (start, positions){
                        const property = new Cesium.SampledPositionProperty();
                        for(let i=0; i<positions.length; i++){
                            const time = Cesium.JulianDate.addSeconds(start, i, new Cesium.JulianDate());
                            const position = Cesium.Cartesian3.fromDegrees(parseFloat(positions[i].fLongitude), parseFloat(positions[i].fLatitude), Cesium.Math.nextRandomNumber() * 500 + 1750);
                            property.addSample(time, position);
                        }
                        return property;
                     }

                function calculateScaleDenominator(viewer) {
                  let scale = null;
                  let centerX = viewer._lastWidth / 2;
                  let centerY = viewer._lastHeight / 2;
                  let cartesian2 = new Cesium.Cartesian2(centerX, centerY);
                  let ray = viewer.camera.getPickRay(cartesian2);
                  let cartesian = viewer.scene.globe.pick(ray, viewer.scene);
                  if (cartesian) {
                    let boundingSphere = new Cesium.BoundingSphere();
                    boundingSphere.center = cartesian;
                    boundingSphere.radius = 0.1;
                    let resolution = viewer.scene.camera.getPixelSize(boundingSphere, viewer.scene.context
                      .drawingBufferWidth, viewer.scene.context.drawingBufferHeight);
                    scale = (96 * resolution) / 0.0254;
                    return {
                      scale: scale,
                      resolution: resolution
                    };
                  } else {
                    return {
                      scale: '-',
                      resolution: '-'
                    };
                  }
                }
