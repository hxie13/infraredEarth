# Default server configuration
#

proxy_cache_path D:\code\java\InfraredEarth\data\nginx\tile_cache levels=1:2 keys_zone=tile_cache:50m max_size=20g inactive=30d use_temp_path=off;

upstream tianditu_servers {
    server t0.tianditu.gov.cn;
    server t1.tianditu.gov.cn;
    server t2.tianditu.gov.cn;
    server t3.tianditu.gov.cn;
	server t4.tianditu.gov.cn;
    server t5.tianditu.gov.cn;
	server t6.tianditu.gov.cn;
}

server {
	listen 80;
	server_name localhost 192.168.0.134;

	location / {
		# First attempt to serve request as file, then
		# as directory, then fall back to displaying a 404.
		try_files $uri $uri/ =404;
	}
	
	location /InfraredEarth {
		root /var/www/InfraredEarth;
		index index.html index.htm;
		try_files $uri $uri/ =404;
	}
	
	location /cva_w {  # 地理标签服务路径
        proxy_pass http://tianditu_servers/cva_w;  # 动态分配服务器
        proxy_cache tile_cache;
        proxy_cache_valid 200 206 304 30d;  # 标签数据更新频率低，缓存30天‌
        proxy_cache_key "$host$uri$is_args$args";  # 完整URL作为缓存键‌
        add_header Access-Control-Allow-Origin *;  # 解决跨域问题‌
		add_header X-Cache-Status $upstream_cache_status;  # 在响应头返回缓存状态
		
		limit_req zone=tile_req burst=20 nodelay;  # 允许瞬时20请求缓冲
    }
	
	location /img_w {  # 地理标签服务路径
        proxy_pass http://tianditu_servers/img_w;  # 动态分配服务器
        proxy_cache tile_cache;
        proxy_cache_valid 200 206 304 30d;  # 标签数据更新频率低，缓存30天‌
        proxy_cache_key "$host$uri$is_args$args";  # 完整URL作为缓存键‌
        add_header Access-Control-Allow-Origin *;  # 解决跨域问题‌
		add_header X-Cache-Status $upstream_cache_status;  # 在响应头返回缓存状态
		
		limit_req zone=tile_req burst=20 nodelay;  # 允许瞬时20请求缓冲
    }
}
