		constructor(viewer) {
			this.viewer = viewer;
			this.rotateActive = false;
			this.delta = 0.001; // 每帧旋转角度
		}

		start() {
			this.rotateActive = true;
			this.viewer.scene.postUpdate.addEventListener(this.rotate);
		}

		stop() {
			this.rotateActive = false;
			this.viewer.scene.postUpdate.removeEventListener(this.rotate);
		}

		rotate = () => {
			if (this.rotateActive) {
				viewer.scene.camera.rotate(Cesium.Cartesian3.UNIT_Z, -this.delta);
			}
		};
	}

	function removeByFixedStep(arr, step = 2) {
	  return arr.filter((_, index) => index % step == 0);

	function calculateScaleForBounds(viewer, minLon, minLat, maxLon, maxLat) {
	  const ellipsoid = viewer.scene.globe.ellipsoid;
	  const centerLat = (minLat + maxLat) / 2; // 中心纬度减少误差
	  
	  // 计算地理距离
	  const geodesic = new Cesium.EllipsoidGeodesic();
	  const start = Cesium.Cartographic.fromDegrees(minLon, centerLat);
	  const end = Cesium.Cartographic.fromDegrees(maxLon, centerLat);
	  geodesic.setEndPoints(start, end);
	  const distance = geodesic.surfaceDistance;
	  
	  // 获取视图像素宽度
	  const pixelWidth = viewer.scene.canvas.clientWidth;
	  
	  // 计算比例尺分母
	  const resolution = distance / pixelWidth;
	  const scaleDenominator = (96 * resolution) / 0.0254;
	  console.log(scaleDenominator);
	  return scaleDenominator;
	}
	
	function flyToPositions(positions, minLng, minLat, maxLng, maxLat) {
		const center = Cesium.BoundingSphere.fromPoints(Cesium.Cartesian3.fromDegreesArray(positions)).center;
		const cartographic = Cesium.Cartographic.fromCartesian(center);
		const centerLat = Cesium.Math.toDegrees(cartographic.latitude);
		const centerLng = Cesium.Math.toDegrees(cartographic.longitude);
				
		viewer.camera.flyTo({
			destination: Cesium.Cartesian3.fromDegrees(centerLng, centerLat, calculateScaleForBounds(viewer, minLng, minLat, maxLng, maxLat)),
		});
	}
	
	function drawOutline(positions, id) {
		const outlinePrimitive = new Cesium.Primitive({
		  geometryInstances: new Cesium.GeometryInstance({
			id: id + '-Outline',
			geometry:new Cesium.PolygonOutlineGeometry({
			  polygonHierarchy: new Cesium.PolygonHierarchy(
				Cesium.Cartesian3.fromDegreesArray(positions)
			  ),
			  width: 10.0,              
			  height: 2 * primitives.size + 0.1,
			  vertexFormat: Cesium.PolylineColorAppearance.VERTEX_FORMAT
			}),
			attributes: {
				color: Cesium.ColorGeometryInstanceAttribute.fromColor(
				  activeColor // 红色线条
				)
			  }
		  }),
		  releaseGeometryInstances: false,
		  asynchronous: false,
		  appearance: new Cesium.PolylineColorAppearance()
		});
		
		viewer.scene.primitives.add(outlinePrimitive);		
		
		return outlinePrimitive;
	}

	function loadGeoJson(addr) {
		Cesium.GeoJsonDataSource.load('./res/test.geojson', {
			  stroke: inactiveColor,
			  fill: Cesium.Color.WHITE.withAlpha(0.5)
		  }).then(dataSource => {
		  viewer.dataSources.add(dataSource);
		  dataSource.entities.values.forEach(entity => {
			if (entity.polygon) {
			  const positions = entity.polygon.hierarchy.getValue().positions;
			  /*entity.polyline = new Cesium.PolylineGraphics({
				positions: positions,
				width: 3,
				material: activeColor.withAlpha(0.8),
				clampToGround: true
			  });*/
			  //entity.polygon.fill = false; // 隐藏填充面
			  
			  let minLng, minLat, maxLng, maxLat = null;
			  for (let position of positions) {
				const cartographic = Cesium.Cartographic.fromCartesian(position);
				const longitude = Cesium.Math.toDegrees(cartographic.longitude); // 经度
				const latitude = Cesium.Math.toDegrees(cartographic.latitude);   // 纬度
				if (!minLng || longitude < minLng) {
					minLng = longitude;
				}
				if (!minLat || latitude < minLat) {
					minLat = latitude;
				}
				if (!maxLng || longitude > maxLng) {
					maxLng = longitude;
				}
				if (!maxLat || latitude > maxLat) {
					maxLat = latitude;
				}
			  }
			  
			  const center = Cesium.BoundingSphere.fromPoints(positions).center;
			  const cartographic = Cesium.Cartographic.fromCartesian(center);
			  const centerLat = Cesium.Math.toDegrees(cartographic.latitude);
			  const centerLng = Cesium.Math.toDegrees(cartographic.longitude);
				
			  viewer.camera.flyTo({
				destination: Cesium.Cartesian3.fromDegrees(centerLng, centerLat, calculateScaleForBounds(viewer, minLng, minLat, maxLng, maxLat)),
			  });
			}
		  });
		}).catch(error => console.error('加载失败:', error));
	}
	
	function loadImgResultUseEntity(imgAddr, leftUpPos, rightBottomPos, id) {
		const positions = [leftUpPos.lon, leftUpPos.lat, rightBottomPos.lon, leftUpPos.lat, 
						rightBottomPos.lon, rightBottomPos.lat, leftUpPos.lon, rightBottomPos.lat];
		
		let minLng = Math.min(leftUpPos.lon, rightBottomPos.lon);
		let maxLng = Math.max(leftUpPos.lon, rightBottomPos.lon);
		let minLat = Math.min(leftUpPos.lat, rightBottomPos.lat);
		let maxLat = Math.max(leftUpPos.lat, rightBottomPos.lat);
		
		if (!entities.get(id)) {
			const rectangle = viewer.entities.add({
				name: 'Multiple Img Result',
				rectangle: {
					coordinates: Cesium.Rectangle.fromDegrees(leftUpPos.lon, leftUpPos.lat, rightBottomPos.lon, rightBottomPos.lat),
					material: new Cesium.ImageMaterialProperty({
						//添加回调
						image: imgAddr,
						transparent: true
					}),
					height: 0,
					outline: true,
					outlineColor: activeColor,
					outlineWidth: 10,
					clampToGround: false	
				}
			});
			entities.set(id, {entity: rectangle, imgAddr: imgAddr});
		} else {
			for (let [key, value] of entities) {
				if (key == id) {	
					value.entity.rectangle.outlineColor = activeColor;
					value.entity.rectangle.material = new Cesium.ImageMaterialProperty({
						//添加回调
						image: value.imgAddr,
						transparent: true
					});
				} else {
					value.entity.rectangle.outlineColor = inactiveColor;
				}
			}
		}
		
		flyToPositions(positions, minLng, minLat, maxLng, maxLat);
	}
	
	function inactiveImgResultUseEntity(id) {
		for (let [key, value] of entities) {
			if (key == id) {
				value.entity.rectangle.material = Cesium.Color.WHITE.withAlpha(0);
				value.entity.rectangle.outlineColor = inactiveColor;
			}
		}
	}
	
	function loadImgResult(imgAddr, leftUpPos, rightBottomPos, id) {
		const positions = [leftUpPos.lon, leftUpPos.lat, rightBottomPos.lon, leftUpPos.lat, 
						rightBottomPos.lon, rightBottomPos.lat, leftUpPos.lon, rightBottomPos.lat];
		
		let minLng = Math.min(leftUpPos.lon, rightBottomPos.lon);
		let maxLng = Math.max(leftUpPos.lon, rightBottomPos.lon);
		let minLat = Math.min(leftUpPos.lat, rightBottomPos.lat);
		let maxLat = Math.max(leftUpPos.lat, rightBottomPos.lat);
		
		if (!primitives.get(id)) {				
			const instances = [new Cesium.GeometryInstance({
				id: id,
				geometry: new Cesium.PolygonGeometry({
					polygonHierarchy: new Cesium.PolygonHierarchy(Cesium.Cartesian3.fromDegreesArray(positions)),
					height: 10 * primitives.size,
					perPositionHeight: false
				}),
				attributes: { color: Cesium.ColorGeometryInstanceAttribute.fromColor(activeColor.withAlpha(0.5)) }
			})];
			const imgPrimitive = new Cesium.Primitive({
				id: id,
				geometryInstances: instances,
				releaseGeometryInstances: false,
				asynchronous: false,
				appearance: new Cesium.EllipsoidSurfaceAppearance({
					material: new Cesium.Material({
					  fabric: {
						type: 'Image', // 指定图片类型材质:ml-citation{ref="5,6" data="citationList"}
						uniforms: {
						  image: imgAddr
						}
					  }
					}),
					flat: true
				})
			});
			
			viewer.scene.primitives.add(imgPrimitive);
			
			const outlinePrimitive = drawOutline(positions, id);
			
			
			const collection = new Cesium.PrimitiveCollection();
			collection.add(imgPrimitive);
			collection.add(outlinePrimitive);

			Promise.all([imgPrimitive.readyPromise, outlinePrimitive.readyPromise])
			  .then(() => {
				primitives.set(id, [imgPrimitive, outlinePrimitive]);
				activePrimitive(id);	
			  })
			  .catch(error => {
				console.error("加载失败:", error);
			  });
			const checkInterval = setInterval(() => {
			  if (collection.ready) {
				clearInterval(checkInterval);
				primitives.set(id, [imgPrimitive, outlinePrimitive]);
				activePrimitive(id);		
				console.log('所有Primitive加载完成');
			  }
			}, 100);
		} else {
			activePrimitive(id);						
		}	

		flyToPositions(positions, minLng, minLat, maxLng, maxLat);
	}

				  geometryInstances: instances,
				  appearance: new Cesium.PerInstanceColorAppearance({
					flat: true, // 关键！
					translucent: true,
					renderState: {
					  lineWidth: 3, // 设置边框粗细
					  lineColor: activeColor
					}
				  })
				}));
												
				const center = Cesium.BoundingSphere.fromPoints(Cesium.Cartesian3.fromDegreesArray(positions)).center;
				const cartographic = Cesium.Cartographic.fromCartesian(center);
				const centerLat = Cesium.Math.toDegrees(cartographic.latitude);
				const centerLng = Cesium.Math.toDegrees(cartographic.longitude);
				
				viewer.camera.flyTo({
				  destination: Cesium.Cartesian3.fromDegrees(centerLng, centerLat, calculateScaleForBounds(viewer, minLng, minLat, maxLng, maxLat)),
				});
			});
	}
	
	function loadImage(url) {
		return new Promise((resolve, reject) => {
			const img = new Image();
			img.src = url;
			img.onload = () => resolve(img);
			img.onerror = reject;
		});
	}

	async function imageArrayToCanvasArray(imageUrls) {
		return Promise.all(imageUrls.map(async (url) => {
			const img = await loadImage(url);
			const canvas = document.createElement('canvas');
			canvas.width = img.width;
			canvas.height = img.height;
			const ctx = canvas.getContext('2d');
			ctx.drawImage(img, 0, 0);
			return canvas;
		}));
	}
	
	function updateImgFrame() {
		currentIndex = (currentIndex + 1) % imageUrls.length;
		return imageUrls[currentIndex];
	}
	
	function loadMulImgResult(imgAddrArr, leftUpPos, rightBottomPos) {
		cleanup();
		
		viewer.scene.mode = Cesium.SceneMode.SCENE2D;
				
		let currentIndex = 0;
		
		let minLng = Math.min(leftUpPos.lon, rightBottomPos.lon);
		let maxLng = Math.max(leftUpPos.lon, rightBottomPos.lon);
		let minLat = Math.min(leftUpPos.lat, rightBottomPos.lat);
		let maxLat = Math.max(leftUpPos.lat, rightBottomPos.lat);
		
		const positions = [leftUpPos.lon, leftUpPos.lat, rightBottomPos.lon, leftUpPos.lat, 
						rightBottomPos.lon, rightBottomPos.lat, leftUpPos.lon, rightBottomPos.lat];
		
		imageArrayToCanvasArray(imgAddrArr).then(imgList => {
			console.log(imgList);
			const rectangle = viewer.entities.add({
				name: 'Multiple Img Result',
				rectangle: {
					coordinates: Cesium.Rectangle.fromDegrees(leftUpPos.lon, leftUpPos.lat, rightBottomPos.lon, rightBottomPos.lat),
					material: new Cesium.ImageMaterialProperty({
						//添加回调
						image: imgList[currentIndex],
						transparent: true
					})
				}
			});
			
			if (minLng == -180 && maxLng == 180 && minLng == -90 && maxLng == -90) {
				viewer.camera.flyTo({
				  destination: Cesium.Cartesian3.fromDegrees(0, 0, 5000000)
				});
			} else {
				flyToPositions(positions, minLng, minLat, maxLng, maxLat);
			}			
			
			let t = window.setInterval(() => {  
			  currentIndex = (currentIndex + 1) % imgList.length;  
			  rectangle.rectangle.material.image = imgList[currentIndex];
			}, 1000);
			timer.push(t);
		});
	}
	
	function markPosition(lon, lat, id, imgAddr) {
		const center = lon + ',' + lat;
		if (!billboards.get(center)) {		
			const billboards = viewer.scene.primitives.add(
			  new Cesium.BillboardCollection()
			);
			
			const billboard = billboards.add({
			  id: id,
			  image: imgAddr,
			  position: Cesium.Cartesian3.fromDegrees(lon, lat),
			  width: 50,
			  height: 50
			});
			
			billboards.set(center, {billboards: billboards, imgAddrArr: [imgAddr]});		
		} else {
			let obj = billboards.get(center);
			obj.imgAddrArr.push(imgAddr);
		}
		viewer.camera.flyTo({
		  destination: Cesium.Cartesian3.fromDegrees(lon, lat, 5000000)
		});
	}
	
	
	function inactivePosition(id) {
		if (primitives.get(id)) {
			primitives.get(id).show = false;
		}
	}
	
	function getZoomLevel(viewer) {
	  const height = viewer.camera.positionCartographic.height;
	  return Math.ceil(21 - Math.log(height / 1000) / Math.LN2) - 4; // 层级公式
	}

	function calculateScaleDenominator(viewer) {
	  let scale = null;
	  let centerX = viewer._lastWidth / 2;
	  let centerY = viewer._lastHeight / 2;
	  let cartesian2 = new Cesium.Cartesian2(centerX, centerY);
	  let ray = viewer.camera.getPickRay(cartesian2);
	  let cartesian = viewer.scene.globe.pick(ray, viewer.scene);
	  if (cartesian) {
		let boundingSphere = new Cesium.BoundingSphere();
		boundingSphere.center = cartesian;
		boundingSphere.radius = 0.1;
		let resolution = viewer.scene.camera.getPixelSize(
		  boundingSphere, 
		  viewer.scene.context.drawingBufferWidth,
		  viewer.scene.context.drawingBufferHeight
		);
		scale = (96 * resolution) / 0.0254;
		return { scale: scale, resolution: resolution };
	  } else {
		return { scale: '-', resolution: '-' };
	  }
	}

	function getResolution(scale) {
	  return scale * 0.0254 / 96; // 96为屏幕DPI, 0.0254英寸转米
	}
	
  </script>
