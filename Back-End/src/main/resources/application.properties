#infrared local db source
spring.datasource.infrareddb.url=${INFRARED_DB_URL:jdbc:postgresql://localhost:5432/infrared_earth}
spring.datasource.infrareddb.username=${INFRARED_DB_USERNAME:postgres}
spring.datasource.infrareddb.password=${INFRARED_DB_PASSWORD:}
spring.datasource.infrareddb.driverClassName=org.postgresql.Driver
banner.charset=UTF-8
server.port=8080
server.tomcat.uri-encoding=UTF-8
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.context-path=/infrared
spring.messages.encoding=UTF-8
#session timeout: minutes
server.servlet.session.timeout=1800
#logs
logging.config=classpath:logback-spring.xml
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false
#project config
app.login.maxfailurecount=5
app.login.lockminutes=5
app.login.expiredday=180
app.cors.allowed-origin-patterns=${INFRARED_CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}
app.storage.data-root=${INFRARED_DATA_ROOT:D:/code/java/InfraredEarth/data}
app.storage.allowed-roots=${INFRARED_STORAGE_ALLOWED_ROOTS:${app.storage.data-root},${user.dir},/data}
accessFile.enabled=${INFRARED_FILES_ENABLED:false}
accessFile.resourceHandler=/files/**
accessFile.accessFilePath=${INFRARED_FILES_PATH:}
#flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration

# Security configuration
# AES encryption key (should be overridden via environment variable in production)
# Key must be 16, 24, or 32 characters long for AES-128, AES-192, or AES-256
app.security.aes.key=${INFRARED_AES_KEY:SITP0123456789AB}
